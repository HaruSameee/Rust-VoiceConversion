<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rust VC</title>
  </head>
  <body>
    <main class="container">
      <header>
        <h1>Rust VC</h1>
        <p class="sub">Realtime Voice Conversion Control Panel</p>
      </header>

      <nav class="tabs" id="settingsTabs" aria-label="設定タブ">
        <button class="tab-btn active" data-tab="model" type="button">モデル/デバイス</button>
        <button class="tab-btn" data-tab="quality" type="button">音質</button>
        <button class="tab-btn" data-tab="realtime" type="button">安定化</button>
        <button class="tab-btn" data-tab="advanced" type="button">GPU/詳細</button>
      </nav>

      <section class="tab-panel active" data-tab-panel="model">
        <section class="card">
          <h2>モデル設定</h2>
          <label for="modelPath">RVC Model (`model.onnx`)</label>
          <input id="modelPath" type="text" placeholder="model/model.onnx" />

          <label for="hubertPath">HuBERT (`hubert.onnx`)</label>
          <input id="hubertPath" type="text" placeholder="model/hubert.onnx" />

          <label for="rmvpePath">RMVPE (`rmvpe.onnx`)</label>
          <input id="rmvpePath" type="text" placeholder="model/rmvpe.onnx" />

          <label for="indexPath">Index (`model_vectors.bin` / `.index`)</label>
          <input id="indexPath" type="text" placeholder="model/model_vectors.bin" />
        </section>

        <section class="card">
          <h2>オーディオデバイス</h2>
          <div class="grid">
            <div class="field">
              <label for="inputDevice">入力デバイス</label>
              <select id="inputDevice"></select>
            </div>
            <div class="field">
              <label for="outputDevice">出力デバイス</label>
              <select id="outputDevice"></select>
            </div>
          </div>
        </section>
      </section>

      <section class="tab-panel" data-tab-panel="quality">
        <section class="card">
          <h2>音質設定</h2>
          <div class="grid">
            <div class="field">
              <label for="pitchShift">Pitch Shift</label>
              <input id="pitchShift" type="number" step="1" min="-24" max="24" />
            </div>
            <div class="field">
              <label for="protect">Protect</label>
              <input id="protect" type="number" step="0.01" min="0" />
            </div>
            <div class="field">
              <label for="indexRate">Index Rate</label>
              <input id="indexRate" type="number" step="0.05" min="0" />
            </div>
            <div class="field">
              <label for="indexSmoothAlpha">Index Smooth</label>
              <input id="indexSmoothAlpha" type="number" step="0.01" min="0" />
            </div>
            <div class="field">
              <label for="indexTopK">Top K</label>
              <input id="indexTopK" type="number" step="1" min="1" />
            </div>
            <div class="field">
              <label for="indexSearchRows">Index Rows</label>
              <input id="indexSearchRows" type="number" step="256" min="0" />
            </div>
            <div class="field">
              <label for="rmvpeThreshold">RMVPE Threshold</label>
              <input id="rmvpeThreshold" type="number" step="0.005" min="0" />
            </div>
            <div class="field">
              <label for="pitchSmoothAlpha">Pitch Smooth</label>
              <input id="pitchSmoothAlpha" type="number" step="0.01" min="0" />
            </div>
            <div class="field">
              <label for="f0MedianFilterRadius">F0 Median Radius</label>
              <input id="f0MedianFilterRadius" type="number" step="1" min="0" />
            </div>
            <div class="field">
              <label for="rmsMixRate">RMS Mix Rate</label>
              <input id="rmsMixRate" type="number" step="0.05" min="0" max="1" />
            </div>
          </div>
        </section>
      </section>

      <section class="tab-panel" data-tab-panel="realtime">
        <section class="card">
          <h2>リアルタイム設定</h2>
          <div class="grid">
            <div class="field">
              <label for="sampleRate">Sample Rate</label>
              <input id="sampleRate" type="number" step="1000" />
            </div>
            <div class="field">
              <label for="blockSize">Block Size</label>
              <input id="blockSize" type="number" step="16" />
            </div>
            <div class="field">
              <label for="extraInferenceMs">Extra Inference (ms)</label>
              <input id="extraInferenceMs" type="number" step="5" min="0" />
            </div>
            <div class="field">
              <label for="targetBufferMs">Target Buffer (ms)</label>
              <input id="targetBufferMs" type="number" step="100" min="500" max="5000" value="2000" />
            </div>
            <div class="field">
              <label for="responseThreshold">Threshold (dBFS/linear)</label>
              <input id="responseThreshold" type="number" step="0.001" min="-90" />
            </div>
            <div class="field">
              <label for="fadeInMs">Fade In (ms)</label>
              <input id="fadeInMs" type="number" step="1" min="0" />
            </div>
            <div class="field">
              <label for="fadeOutMs">Fade Out (ms)</label>
              <input id="fadeOutMs" type="number" step="1" min="0" />
            </div>
            <div class="field">
              <label for="solaSearchMs">SOLA Search (ms)</label>
              <input id="solaSearchMs" type="number" step="1" min="1" />
            </div>
            <div class="field">
              <label for="outputTailOffsetMs">Output Tail Offset (ms)</label>
              <input id="outputTailOffsetMs" type="number" step="1" min="0" />
            </div>
            <div class="field">
              <label for="sliceOffsetSamples">Slice Offset (samples)</label>
              <input id="sliceOffsetSamples" type="number" step="1" min="0" max="48000" />
            </div>
            <div class="field">
              <label for="bypassSlicing">
                <input id="bypassSlicing" type="checkbox" />
                Bypass Slicing
              </label>
            </div>
            <div class="field">
              <label for="recordDump">
                <input id="recordDump" type="checkbox" />
                Record debug WAV dump
              </label>
            </div>
          </div>
        </section>
      </section>

      <section class="tab-panel" data-tab-panel="advanced">
        <section class="card">
          <h2>GPU / 詳細設定</h2>
          <div class="grid">
            <div class="field">
              <label for="inputGain">Input Gain</label>
              <input id="inputGain" type="number" step="0.1" />
            </div>
            <div class="field">
              <label for="outputGain">Output Gain</label>
              <input id="outputGain" type="number" step="0.1" />
            </div>
            <div class="field">
              <label for="speakerId">Speaker ID</label>
              <input id="speakerId" type="number" step="1" />
            </div>
            <div class="field">
              <label for="ortProvider">ORT Provider</label>
              <select id="ortProvider">
                <option value="cuda">CUDA</option>
                <option value="directml">DirectML</option>
                <option value="auto">Auto</option>
                <option value="cpu">CPU</option>
              </select>
            </div>
            <div class="field">
              <label for="ortDeviceId">GPU Device ID</label>
              <input id="ortDeviceId" type="number" step="1" min="0" />
            </div>
            <div class="field">
              <label for="ortGpuMemLimitMb">GPU VRAM Limit (MB)</label>
              <input id="ortGpuMemLimitMb" type="number" step="128" min="0" />
            </div>
            <div class="field">
              <label for="cudaConvAlgo">CUDA Conv Algorithm</label>
              <select id="cudaConvAlgo">
                <option value="default">default</option>
                <option value="exhaustive">exhaustive</option>
              </select>
            </div>
            <div class="field">
              <label for="cudaWs">
                <input id="cudaWs" type="checkbox" />
                CUDA Workspace (`cuda_ws`)
              </label>
            </div>
            <div class="field">
              <label for="cudaTf32">
                <input id="cudaTf32" type="checkbox" />
                TF32 (`cuda_tf32`)
              </label>
            </div>
            <div class="field">
              <label for="ortIntraThreads">ORT Intra Threads</label>
              <input id="ortIntraThreads" type="number" step="1" min="0" />
            </div>
            <div class="field">
              <label for="ortInterThreads">ORT Inter Threads</label>
              <input id="ortInterThreads" type="number" step="1" min="1" />
            </div>
          </div>
        </section>
      </section>

      <section class="card">
        <h2>エンジン制御</h2>
        <div class="grid">
          <div class="field">
            <label for="presetSelect">Preset</label>
            <select id="presetSelect"></select>
          </div>
          <div class="field">
            <label for="presetName">Preset Name</label>
            <input id="presetName" type="text" placeholder="my-preset" />
          </div>
        </div>
        <div class="actions">
          <button id="presetSaveBtn">Save Preset</button>
          <button id="presetApplyBtn">Apply Preset</button>
          <button id="presetDeleteBtn">Delete Preset</button>
        </div>
        <div class="actions">
          <button id="reloadBtn">Reload</button>
          <button id="saveBtn">Save</button>
          <button id="startBtn" class="primary">Start</button>
          <button id="stopBtn">Stop</button>
        </div>
        <p id="statusLine">status: idle</p>
        <p id="levelLine">input level: rms 0.0000 / peak 0.0000</p>
        <p id="messageLine" class="message"></p>
      </section>

      <section class="card log-card">
        <div class="log-head">
          <h2>ログ</h2>
          <button id="clearLogBtn">Clear</button>
        </div>
        <pre id="logBox"></pre>
      </section>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
